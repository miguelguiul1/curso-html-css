<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>iFood</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header>
      <!-- LOGO -->
      <div class="logo-container">
        <img
          src="Imagem/IFood_logo.svg.webp"
          alt="Logo do iFood"
          class="logo"
        />
      </div>

      <!-- MENU -->
      <nav>
        <a href="#">Entregador</a>
        <a href="#">Restaurante e Mercado</a>
        <a href="#">Carreiras</a>
        <a href="#">iFood Benefícios</a>
      </nav>

      <!-- BOTÕES -->
      <div class="buttons">
        <button class="Cr">Criar conta</button>

        <button class="En">Entrar</button>
      </div>
    </header>

    <!-- CONTEÚDO -->
    <section class="an">
      <h1>Tudo pra facilitar seu dia a dia</h1>

      <p>O que você precisa está aqui. Peça e receba onde estiver.</p>

      <!-- FORMULÁRIO -->
      <form>
        <!-- INPUT -->
        <div class="localizacao">
          <img src="Imagem/Localização.png" alt="Localização" />

          <input type="text" placeholder="Endereço de entrega e número" />
        </div>

        <!-- BOTÃO -->
        <button type="button" class="pesquisa">Buscar</button>
      </form>
    </section>
  </body>
</html>
